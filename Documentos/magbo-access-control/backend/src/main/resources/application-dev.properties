# ============================================================
# MAGBO Access Control - DEV Environment (In-Memory H2)
# ============================================================

# --- Server ---
server.port=8080

# --- H2 Database (Memory) ---
spring.datasource.url=jdbc:h2:mem:magbo_access;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Enable H2 Web Console to inspect DB at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false
