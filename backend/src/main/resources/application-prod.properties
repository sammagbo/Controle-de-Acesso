# =============================================================
# MAGBO ACCESS CONTROL — PRODUCTION PROFILE
# =============================================================
# Activated via: mvn spring-boot:run -Dspring-boot.run.profiles=prod
# OR: java -jar target/access-control-*.jar --spring.profiles.active=prod
# =============================================================

# --- Datasource (PostgreSQL via Docker) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/magbodb
spring.datasource.username=magbo
spring.datasource.password=magbo_dev_pass_2026
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# DB uses timestamp without time zone stored in local time (BRT).
# Do NOT set hibernate.jdbc.time_zone — it would shift reads by UTC offset.
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# --- HikariCP (production-tuned) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# --- Logging ---
logging.level.root=INFO
logging.level.com.magbo.access=INFO
logging.level.org.hibernate.SQL=WARN

# --- Server ---
server.port=8080
server.error.include-message=on_param
server.error.include-stacktrace=never

# --- JWT (same secret as dev for now — change in production) ---
magbo.jwt.secret=${MAGBO_JWT_SECRET:ZGV2U2VjcmV0Q2hhbmdlSW5Qcm9kdWN0aW9uV2l0aEVudlZhckxvbmdFbm91Z2hGb3JIUzM4NEFsZ29yaXRobVNlY3VyZUtleQ==}
magbo.jwt.expiration-hours=24

# --- Webhook token (optional, set via env var) ---
magbo.webhook.token=${MAGBO_WEBHOOK_TOKEN:}

# --- Pronote Sync ---
pronote.sync.cron=0 0 3 * * ?
pronote.sync.filepath=./ftp_drop/export_pronote.csv
# Pronote data source: csv (default) or api
pronote.source=csv
# Pronote API (filled when IT provides credentials)
pronote.api.url=
pronote.api.token=
