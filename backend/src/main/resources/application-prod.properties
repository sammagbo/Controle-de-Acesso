# ============================================================
# MAGBO Access Control - PRODUCTION Environment
# ============================================================
# Activate with: SPRING_PROFILES_ACTIVE=prod
# All sensitive values MUST be set via environment variables.
# ============================================================

# --- Server ---
server.port=${SERVER_PORT:8080}
server.address=0.0.0.0

# --- PostgreSQL DataSource ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/magbo_db}
spring.datasource.username=${DB_USERNAME:magbo}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# --- JPA / Hibernate ---
# IMPORTANT: validate in production — do NOT auto-modify schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false

# --- SQL Init (DISABLED in production — no data.sql) ---
spring.sql.init.mode=never

# --- Logging ---
logging.file.name=${LOG_PATH:/var/log/magbo}/application.log
logging.level.root=INFO
logging.level.com.magbo=INFO
logging.level.org.hibernate.SQL=WARN

# --- Admin PIN ---
admin.pin=${ADMIN_PIN:}

# --- Hikvision Webhook Security ---
magbo.webhook.token=${MAGBO_WEBHOOK_TOKEN:}

# --- Pronote Sync ---
pronote.sync.cron=0 0 3 * * ?
pronote.sync.filepath=${PRONOTE_EXPORT_PATH:./ftp_drop/export_pronote.csv}

# JWT Configuration — produção lê de env var
magbo.jwt.secret=${MAGBO_JWT_SECRET}
magbo.jwt.expiration-ms=${MAGBO_JWT_EXPIRATION_MS:28800000}

# Admin inicial — só usado no primeiro boot
magbo.admin.username=${MAGBO_ADMIN_USERNAME:admin}
magbo.admin.password=${MAGBO_ADMIN_PASSWORD}
magbo.admin.nome=${MAGBO_ADMIN_NOME:Administrador}
