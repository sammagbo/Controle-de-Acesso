# ============================================================
# MAGBO Access Control - Application Properties
# ============================================================

spring.profiles.active=dev

# --- Server ---
server.port=${SERVER_PORT:8080}

# --- PostgreSQL DataSource ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/magbo_access}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false

# --- Pronote Sync ---
pronote.sync.cron=0 0 3 * * ?
pronote.sync.filepath=./ftp_drop/export_pronote.csv

# --- População de Testes QA ---
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
