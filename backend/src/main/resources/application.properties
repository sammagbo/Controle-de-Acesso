# ============================================================
# MAGBO Access Control - Application Properties
# ============================================================

spring.profiles.active=dev

# --- Server ---
server.port=${SERVER_PORT:8080}

# --- PostgreSQL DataSource ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/magbo_access}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- Jackson ---
# DB uses timestamp without time zone stored in local time (BRT).
# Do NOT set hibernate.jdbc.time_zone — it would shift reads by UTC offset.
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# --- Pronote Sync ---
pronote.sync.cron=0 0 3 * * ?
pronote.sync.filepath=./ftp_drop/export_pronote.csv
# Pronote data source: csv (default) or api
pronote.source=csv
# Pronote API (filled when IT provides credentials)
pronote.api.url=
pronote.api.token=

# --- População de Testes QA ---
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# --- Admin PIN ---
admin.pin=${ADMIN_PIN:1234}

# --- Hikvision Webhook Security ---
magbo.webhook.token=${MAGBO_WEBHOOK_TOKEN:}
