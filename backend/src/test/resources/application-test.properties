# ============================================================
# MAGBO Access Control - Perfil TEST (H2 em memoria)
# ============================================================
# @ActiveProfiles("test") anula o spring.profiles.active=dev do
# application.properties, entao application-dev.properties NAO carrega.
# Herdamos apenas o application.properties base -- que aponta para o
# PostgreSQL. Tudo que for de banco PRECISA ser sobrescrito aqui.

# --- H2 em memoria ---
# NON_KEYWORDS=HOUR: HOUR e palavra reservada no H2 2.x e quebra o
# "EXTRACT(HOUR FROM timestamp) AS hour ... GROUP BY hour" de
# AccessLogRepository.countByHour (nativeQuery de producao, nao alteravel).
spring.datasource.url=jdbc:h2:mem:magbotest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=HOUR
# O base fixa org.postgresql.Driver -- sem esta linha, URL H2 + driver PG falha.
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- data.sql NAO deve rodar ---
# O base tem spring.sql.init.mode=always e data.sql e seed de QA em sintaxe
# H2 (MERGE ... KEY). Em PostgreSQL ele falha silencioso; em H2 ele EXECUTA e
# semearia 11 usuarios fantasma, poluindo toda asercao de contagem.
spring.sql.init.mode=never

# --- H2 console desligado nos testes ---
spring.h2.console.enabled=false

# --- Webhook: token fixo de integracao ---
magbo.webhook.token=test-token-fixo-para-integracao

# --- JWT ---
# JwtService le ${magbo.jwt.secret} SEM default: o contexto nao sobe sem isto.
# 65 bytes decodificados (HS512). Segredo de teste, nao usado em lugar nenhum.
magbo.jwt.secret=bWFnYm8tdGVzdC1qd3Qtc2VjcmV0LW5vdC1hLXJlYWwtc2VjcmV0LTAxMjM0NTY3ODktYWJjZGVmZ2hpamtsbW4=
magbo.jwt.expiration-ms=28800000

# --- Admin inicial (AdminBootstrap) -- login deterministico nos ITs de auth ---
magbo.admin.username=admin
magbo.admin.password=admin1234
magbo.admin.nome=Administrador de Teste

# --- Pronote: desliga o @Scheduled ---
# @EnableScheduling esta ativo e PronoteSyncService usa @Scheduled(cron=
# "${pronote.sync.cron}"). "-" e Scheduled.CRON_DISABLED.
pronote.sync.cron=-

# --- Politicas de decisao (explicitas: os testes nao dependem de defaults) ---
magbo.policy.meal-not-entitled=DENY
magbo.policy.meal-pending=OBSERVATION
magbo.policy.outside-meal-time=OBSERVATION
magbo.policy.duplicate-meal=OBSERVATION
magbo.policy.exit-not-authorized=DENY
magbo.policy.user-inactive=DENY
magbo.policy.missing-door-mapping=FALLBACK

# --- Deduplicacao ---
magbo.dedup.enabled=true
magbo.dedup.window-seconds=90

# --- Ruido ---
logging.level.org.hibernate.SQL=WARN
logging.level.com.magbo.access=WARN
