services:
  postgres:
    image: postgres:16-alpine
    container_name: magbo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-magbodb}
      POSTGRES_USER: ${POSTGRES_USER:-magbo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_prod}
    volumes:
      - magbo_pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-magbo} -d ${POSTGRES_DB:-magbodb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: eclipse-temurin:17-jre-alpine
    container_name: magbo-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-magbodb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-magbo}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_prod}
      MAGBO_JWT_SECRET: ${MAGBO_JWT_SECRET}
      MAGBO_WEBHOOK_TOKEN: ${MAGBO_WEBHOOK_TOKEN:-}
    ports:
      - "8080:8080"
    volumes:
      - ../backend/target:/app
    working_dir: /app
    command: ["sh", "-c", "java -jar access-control-*.jar"]

volumes:
  magbo_pg_data:
    name: magbo_pg_data
